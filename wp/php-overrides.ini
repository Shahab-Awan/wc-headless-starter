; PHP ini overrides for wc-headless-starter.
; Mounted into /usr/local/etc/php/conf.d/ on both the Apache and CLI containers
; so every PHP invocation (web and wp-cli) gets the same limits.
; 1024M is headroom for WC admin heavy operations (plugin activation,
; product imports, media uploads) which easily OOM at the 128M default.

memory_limit = 1024M
max_execution_time = 300
upload_max_filesize = 128M
post_max_size = 128M
