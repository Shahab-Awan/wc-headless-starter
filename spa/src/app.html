		<!-- Static SEO fallback.
		     The deploy workflow replaces this block with per-site metadata from
		     /wp-json/wchs/v1/config. Keep generic defaults here so a blocked or
		     failed config request can never leak starter branding into SERPs. -->
		<!-- STATIC_SEO_START -->
		<title data-static-seo="title">Online Store</title>
		<meta data-static-seo="description" name="description" content="Browse products, review your cart, and checkout securely." />
		<meta data-static-seo="robots" name="robots" content="index,follow" />
		<!-- STATIC_SEO_END -->
		<meta name="google-site-verification" content="lPqtryI4L3vvRpCBbmfu2SJgJlxGn0hsYf4JdlJ-sos" />
		<!-- Favicon + touch icons. /favicon.ico is a real file at the webroot
		     (drop the site's square logo there so browsers that auto-request
		     /favicon.ico get the brand mark instead of the SPA shell).
		     apple-touch-icon covers iOS home-screen bookmarks. -->
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<!-- Web app manifest — powers "Add to Home Screen" on mobile + lifts
		     Lighthouse PWA score. Generated per-site during deploy from
		     bin/templates/site.webmanifest.template. -->
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="theme-color" content="#06b6d4" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0e7490" media="(prefers-color-scheme: dark)" />
		<!-- Fonts from Bunny (GDPR-safer drop-in for Google Fonts).
		     Inter is the default for all body/UI copy. Extra weights 300/700/800/900
		     are loaded so admins picking "Extra Bold" or "Black" for the hero
		     (when Inter is the selected headline font) render correctly.
		     Non-Inter hero fonts are loaded dynamically in +layout.svelte via loadHeroFont(). -->
		<link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
		<link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:300,400,450,500,600,700,800,900&display=swap" />
		<!-- Apply saved / system theme BEFORE any CSS paints to prevent flash.
		     Reads cookie first (shared cross-port with native WP pages),
		     then localStorage, then prefers-color-scheme. -->

		<script>
			(function () {
				try {
					var urlTheme = null;
					var urlMatch = location.search.match(/[?&]theme=(light|dark)(?:&|$)/);
					if (urlMatch) urlTheme = urlMatch[1];
					var isPreview = /[?&]preview=1(?:&|$)/.test(location.search);
					var theme = 'light';
					if (isPreview && (urlTheme === 'light' || urlTheme === 'dark')) {
						theme = urlTheme;
					}
					document.documentElement.setAttribute('data-theme', theme);
					document.documentElement.style.colorScheme = theme;
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'light');
					document.documentElement.style.colorScheme = 'light';
				}
			})();
		</script>
